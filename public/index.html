<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalNoteBox</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>LocalNoteBox</h1>
      <div class="search-wrap">
        <span class="search-icon">&#x1F50D;</span>
        <input type="text" id="search-input" placeholder="Search notes..." />
      </div>
      <div class="header-actions">
        <button id="btn-export" class="btn-icon" title="Export notes as JSON"><span class="ico">&#x2191;</span> Export</button>
        <button id="btn-import" class="btn-icon" title="Import notes from JSON"><span class="ico">&#x2193;</span> Import</button>
        <button id="btn-sync" class="btn-icon" title="Sync encrypted notes to server"><span class="ico">&#x21BB;</span> Sync</button>
        <button id="btn-theme" class="btn-icon" title="Toggle dark/light mode"><span class="ico" id="theme-icon">&#x263E;</span></button>
      </div>
    </header>
    <main>
      <aside id="sidebar">
        <div class="sidebar-header">
          <span class="label">Notes</span>
          <span id="note-count" class="count">0</span>
        </div>
        <button id="btn-new-note" class="btn-primary">+ New Note</button>
        <div id="tag-filter"></div>
        <div id="note-list"></div>
      </aside>
      <section id="editor">
        <div id="editor-empty" class="editor-empty">
          <div class="empty-icon">&#x1F4DD;</div>
          <h2>LocalNoteBox</h2>
          <p>Your notes live in your browser. Nothing leaves your machine.</p>
          <div class="shortcut-hint">
            <span><kbd>Ctrl+N</kbd> new note</span>
            <span><kbd>Ctrl+S</kbd> save</span>
          </div>
        </div>
        <div id="editor-active" class="editor-active" style="display:none">
          <div class="editor-header">
            <input type="text" id="note-title" placeholder="Note title..." />
            <div id="editor-tags" class="editor-tags"></div>
          </div>
          <div class="editor-panes">
            <textarea id="note-content" placeholder="Write your note in Markdown..."></textarea>
            <div class="pane-divider"></div>
            <div id="note-preview" class="markdown-preview"></div>
          </div>
          <div class="editor-footer">
            <label class="toggle-label">
              <input type="checkbox" id="toggle-preview" checked />
              <span>Preview</span>
            </label>
            <span id="save-indicator" class="save-indicator"></span>
            <button id="btn-delete-note" class="btn-icon btn-danger"><span class="ico">&#x2715;</span> Delete</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <input type="file" id="import-input" accept=".json" style="display:none" />

  <div id="sync-modal" class="modal-overlay" style="display:none">
    <div class="modal">
      <h2>Sync</h2>
      <div class="form-group">
        <label>Server URL</label>
        <input type="text" id="sync-url" value="http://localhost:4040" placeholder="http://localhost:4040" />
      </div>
      <div class="form-group">
        <label>Encryption Passphrase</label>
        <input type="password" id="sync-passphrase" placeholder="Enter passphrase" />
      </div>
      <div class="modal-actions">
        <button id="btn-sync-push" class="btn-primary">Push to Server</button>
        <button id="btn-sync-pull" class="btn-secondary">Pull from Server</button>
        <button id="btn-sync-close" class="btn-ghost">Close</button>
      </div>
      <p id="sync-status" class="sync-status"></p>
    </div>
  </div>

  <div id="confirm-modal" class="modal-overlay" style="display:none">
    <div class="modal confirm-modal">
      <h2 id="confirm-title">Confirm</h2>
      <p id="confirm-message">Are you sure?</p>
      <div class="modal-actions">
        <button id="confirm-cancel" class="btn-ghost">Cancel</button>
        <button id="confirm-ok" class="btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@5/marked.min.js"></script>
  <script src="/js/db.js"></script>
  <script src="/js/crypto.js"></script>
  <script src="/js/sync.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
